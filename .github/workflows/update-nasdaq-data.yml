name: 나스닥100 데이터 자동 갱신

on:
  schedule:
    # 매주 토요일 00:00 UTC (한국시간 토요일 09:00) — 금요일 미국장 마감 데이터 반영 후 실행
    - cron: '0 0 * * 6'
  workflow_dispatch: {} # 수동 실행 버튼으로도 트리거 가능

permissions:
  contents: write

jobs:
  collect-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 의존성 설치
        run: python -m pip install --upgrade pip yfinance pandas

      - name: 데이터 수집 스크립트 실행 (public/data/nasdaq100.json 덮어쓰기)
        run: python scripts/collect_data.py

      - name: 변경 여부 확인
        id: diff
        run: |
          if git diff --quiet -- public/data/nasdaq100.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 변경사항 커밋 및 푸시
        if: steps.diff.outputs.changed == 'true'
        run: |
          GENERATED_AT=$(python -c "import json; print(json.load(open('public/data/nasdaq100.json'))['generatedAt'])")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/nasdaq100.json
          git commit -m "chore: 나스닥100 데이터 자동 갱신 (기준일 ${GENERATED_AT})"
          git push
